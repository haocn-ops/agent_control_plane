name: CI baseline

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-baseline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-observability:
    name: validate:observability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate observability examples
        run: npm run validate:observability

  verify-local:
    name: verify:local
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run local verification
        run: npm run verify:local

  verify-build:
    name: verify:build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build verification
        run: npm run verify:build
